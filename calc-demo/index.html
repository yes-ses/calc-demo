<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>简易在线计算器</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#eef2f7;
            font-family:Arial, sans-serif;
        }
        .calculator{
            background:#2d3748;
            padding:24px;
            border-radius:16px;
            box-shadow:0 8px 24px #cbd5e0;
        }
        #display{
            width:100%;
            padding:16px 12px;
            font-size:32px;
            text-align:right;
            margin-bottom:16px;
            border:none;
            border-radius:8px;
            background:#f7fafc;
        }
        .btn-grid{
            display:grid;
            grid-template-columns: repeat(4, 70px);
            gap:10px;
        }
        button{
            height:70px;
            font-size:22px;
            border:none;
            border-radius:10px;
            cursor:pointer;
        }
        .num{background:#f7fafc;color:#222}
        .op{background:#4299e1;color:#fff}
        .clear{background:#e53e3e;color:#fff}
        .equal{background:#38a169;color:#fff;grid-column:span 2}
    </style>
</head>
<body>
    <div class="calculator">
        <input id="display" readonly>
        <div class="btn-grid">
            <button class="clear" onclick="clearAll()">C</button>
            <button class="op" onclick="inputSym('/')">/</button>
            <button class="op" onclick="inputSym('*')">×</button>
            <button class="op" onclick="inputSym('-')">-</button>

            <button class="num" onclick="inputNum('7')">7</button>
            <button class="num" onclick="inputNum('8')">8</button>
            <button class="num" onclick="inputNum('9')">9</button>
            <button class="op" onclick="inputSym('+')">+</button>

            <button class="num" onclick="inputNum('4')">4</button>
            <button class="num" onclick="inputNum('5')">5</button>
            <button class="num" onclick="inputNum('6')">6</button>
            <button class="equal" onclick="calcResult()">=</button>

            <button class="num" onclick="inputNum('1')">1</button>
            <button class="num" onclick="inputNum('2')">2</button>
            <button class="num" onclick="inputNum('3')">3</button>
            <button class="num" onclick="inputNum('0')">0</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        // 输入数字
        function inputNum(num){
            display.value += num;
        }
        // 输入运算符
        function inputSym(sym){
            display.value += sym;
        }
        // 清空屏幕
        function clearAll(){
            display.value = '';
        }
        // 计算结果
        function calcResult(){
            try{
                let res = eval(display.value);
                display.value = res;
            }catch(err){
                display.value = "计算错误";
            }
        }
    </script>
</body>
</html>
